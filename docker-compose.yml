services:

  # ── MySQL Database ──────────────────────────────────────────────────────────
  db:
    image: mariadb:10.4
    restart: always
    environment:
      # Explicit password avoids "Access denied for root" when the data volume
      # was created under different settings or MariaDB remote auth differs from empty root.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-medlab_root_change_me}
      MYSQL_DATABASE: medlab_inventory
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./medlab_inventory.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - inventory_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── phpMyAdmin (Database Manager) ───────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-medlab_root_change_me}
    networks:
      - inventory_net
    depends_on:
      db:
        condition: service_healthy

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    restart: always
    networks:
      - inventory_net

  # ── PHP API ────────────────────────────────────────────────────────────────
  api:
    image: inventory_api:latest
    build:
      context: ./inventory_api
      dockerfile: Dockerfile
    restart: always
    environment:
      DB_HOST: db
      DB_NAME: medlab_inventory
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-medlab_root_change_me}
      REDIS_HOST: redis
    volumes:
      - api_logs:/var/log/apache2
    networks:
      - inventory_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/ping.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Flutter Web ────────────────────────────────────────────────────────────
  web:
    image: inventory_web:latest
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: always
    networks:
      - inventory_net
    depends_on:
      api:
        condition: service_healthy

  # ── Nginx Reverse Proxy (Production Only) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    networks:
      - inventory_net
    depends_on:
      - web
      - api
      - phpmyadmin

volumes:
  db_data:
  api_logs:

networks:
  inventory_net:
    driver: bridge