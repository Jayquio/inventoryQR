services:

  # ── MySQL Database (Replaces XAMPP MySQL) ──────────────────────────────────
  db:
    image: mariadb:10.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-}"
      MYSQL_ALLOW_EMPTY_PASSWORD: "${MYSQL_ALLOW_EMPTY_PASSWORD:-yes}"
      MYSQL_DATABASE: medlab_inventory
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./medlab_inventory.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - inventory_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── phpMyAdmin (Database Manager) ───────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: "${MYSQL_ROOT_PASSWORD:-}"
    # ports:
    #   - "${PMA_PORT:-8889}:80"
    networks:
      - inventory_net
    depends_on:
      db:
        condition: service_healthy

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    restart: always
    networks:
      - inventory_net

  # ── PHP API ────────────────────────────────────────────────────────────────
  api:
    image: inventory_api:latest
    build:
      context: ./inventory_api
      dockerfile: Dockerfile
    restart: always
    environment:
      DB_HOST: db
      DB_NAME: medlab_inventory
      DB_USER: root
      DB_PASS: "${MYSQL_ROOT_PASSWORD:-}"
      REDIS_HOST: redis
    # ports:
    #   - "${API_PORT:-8081}:80"
    volumes:
      - api_logs:/var/log/apache2
    networks:
      - inventory_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/ping.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Flutter Web ────────────────────────────────────────────────────────────
  web:
    image: inventory_web:latest
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: always
    # ports:
    #   - "${WEB_PORT:-8000}:80"
    networks:
      - inventory_net
    depends_on:
      api:
        condition: service_healthy

  # ── Nginx Reverse Proxy (Production Only) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    networks:
      - inventory_net
    depends_on:
      - web
      - api
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # Optional HTTPS: put Cloudflare Origin cert or Let’s Encrypt files here and enable ssl in nginx.prod.conf
      # - ./certs:/etc/nginx/certs:ro
    networks:
      - inventory_net
    depends_on:
      - web
      - api
      - phpmyadmin

volumes:
  db_data:
  api_logs:

networks:
  inventory_net:
    driver: bridge