services:

  # ── MySQL Database (Replaces XAMPP MySQL) ──────────────────────────────────
  db:
    image: mariadb:10.4
    container_name: inventory_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: medlab_inventory
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./medlab_inventory.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - inventory_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── phpMyAdmin (Database Manager) ───────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: inventory_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ""
    ports:
      - "8888:80"
    networks:
      - inventory_net
    depends_on:
      db:
        condition: service_healthy

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: inventory_cache
    restart: always
    networks:
      - inventory_net

  # ── PHP API ────────────────────────────────────────────────────────────────
  api:
    image: inventory_api:latest
    build:
      context: ./inventory_api
      dockerfile: Dockerfile
    container_name: inventory_api
    restart: always
    environment:
      DB_HOST: db
      DB_NAME: medlab_inventory
      DB_USER: root
      DB_PASS: ""
      REDIS_HOST: redis
    ports:
      - "8080:80"
    volumes:
      - api_logs:/var/log/apache2
    networks:
      - inventory_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/ping.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Flutter Web ────────────────────────────────────────────────────────────
  web:
    image: inventory_web:latest
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: inventory_web
    restart: always
    ports:
      - "8000:80"
    networks:
      - inventory_net
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
  api_logs:

networks:
  inventory_net:
    driver: bridge